<style>
#theme-toggle {
  margin-left: 0.5rem;
  padding: 0.4rem 0.7rem;
  border: 1px solid currentColor;
  border-radius: 999px;
  background: transparent;
  color: inherit;
  font: inherit;
  line-height: 1.2;
  cursor: pointer;
  opacity: 0.95;
}

#theme-toggle:hover {
  background: var(--code-background-color, rgba(127, 127, 127, 0.15));
}

#theme-toggle:focus {
  outline: none;
}

#theme-toggle:focus-visible {
  outline: 2px solid currentColor;
  outline-offset: 2px;
}
</style>

<button id="theme-toggle" type="button">🌙&nbsp;Dark mode</button>

<script>
(function () {
  function getCurrentTheme() {
    var theme = localStorage.getItem('jtd-theme');
    if (theme === 'dark' || theme === 'light') return theme;
    return 'light';
  }

  function applyLabel(btn, theme) {
    btn.innerHTML = theme === 'dark' ? '☀️&nbsp;Light mode' : '🌙&nbsp;Dark mode';
    btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
  }

  function applyTheme(theme) {
    if (window.jtd && typeof window.jtd.setTheme === 'function') {
      window.jtd.setTheme(theme);
      return true;
    }
    return false;
  }

  function applyPersistedThemeWithRetry(theme, attempts) {
    if (applyTheme(theme)) return;
    if (attempts <= 0) return;
    setTimeout(function () {
      applyPersistedThemeWithRetry(theme, attempts - 1);
    }, 60);
  }

  function initThemeToggle() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    var currentTheme = getCurrentTheme();
    applyPersistedThemeWithRetry(currentTheme, 20);
    applyLabel(btn, currentTheme);

    btn.addEventListener('click', function () {
      var current = getCurrentTheme();
      var next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('jtd-theme', next);
      applyLabel(btn, next);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initThemeToggle);
  } else {
    initThemeToggle();
  }
})();
</script>
